version: "3.9"

services:
  web:
    container_name: central-tickets
    image: central-tickets
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_KEY: ${NEXT_PUBLIC_KEY}
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    restart: unless-stopped
